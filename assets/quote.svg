<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg4 { fill:#000; }
      .scan{ fill:none; stroke:#00b4d815; stroke-width:0.4; }
      .qtxt{
        font-family:'Courier New',monospace;
        font-size:18px;
        fill:#fff;
        letter-spacing:2px;
      }
      .qsub{
        font-family:'Courier New',monospace;
        font-size:11px;
        fill:#00b4d8;
        letter-spacing:5px;
      }
      .qline{
        stroke:#00b4d8;
        stroke-width:0.8;
        stroke-dasharray:6 10;
        animation: dashQ 4s linear infinite;
      }
      @keyframes dashQ { to{ stroke-dashoffset:-100; } }

      /* orbit ring around quote */
      .orbit1 {
        fill:none; stroke:#00b4d820; stroke-width:1;
        animation: spinOrbit 20s linear infinite;
        transform-origin: 450px 80px;
      }
      .orbit2 {
        fill:none; stroke:#00b4d830; stroke-width:0.5; stroke-dasharray:3 9;
        animation: spinOrbit 14s linear infinite reverse;
        transform-origin: 450px 80px;
      }

      @keyframes spinOrbit { to{ transform:rotate(360deg); } }

      /* orbiting dot on ring 1 */
      .orb-dot {
        fill:#00b4d8;
        animation: orbitDot 20s linear infinite;
      }
      @keyframes orbitDot {
        from{ transform: rotate(0deg) translateX(200px) rotate(0deg); }
        to  { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
      }

      /* quote marks */
      .qmark {
        font-family:'Courier New',monospace;
        font-size:50px;
        fill:#00b4d820;
        animation: qmarkPulse 4s ease-in-out infinite;
      }
      @keyframes qmarkPulse {
        0%,100%{ fill:#00b4d820; }
        50%    { fill:#00b4d850; }
      }

      /* corner decorations */
      .corner { fill:none; stroke:#00b4d8; stroke-width:1.5; stroke-linecap:square; }
      .corner-pulse { animation: cpulse 3s ease-in-out infinite; }
      @keyframes cpulse {
        0%,100%{ stroke-opacity:0.3; }
        50%    { stroke-opacity:1; }
      }

      /* particle dots */
      .pdot { fill:#00b4d8; }
      .pa1  { animation: pa 5s ease-in-out infinite; }
      .pa2  { animation: pa 7s ease-in-out infinite 1s; }
      .pa3  { animation: pa 4s ease-in-out infinite 2s; }
      @keyframes pa {
        0%,100%{ opacity:0.3; transform:translateY(0); }
        50%    { opacity:1;   transform:translateY(-8px); }
      }
    </style>
    <pattern id="sp4" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <line class="scan" x1="0" y1="0" x2="900" y2="0"/>
    </pattern>
  </defs>

  <rect width="900" height="160" class="bg4"/>
  <rect width="900" height="160" fill="url(#sp4)"/>

  <!-- orbit rings (decorative, behind text) -->
  <ellipse class="orbit1" cx="450" cy="80" rx="200" ry="55"/>
  <ellipse class="orbit2" cx="450" cy="80" rx="190" ry="50"/>

  <!-- orbiting dots -->
  <g style="transform-origin:450px 80px; animation:spinOrbit 20s linear infinite;">
    <circle class="pdot" cx="650" cy="80" r="3"/>
  </g>
  <g style="transform-origin:450px 80px; animation:spinOrbit 14s linear infinite reverse;">
    <circle class="pdot" cx="260" cy="80" r="2"/>
  </g>

  <!-- dashed lines top/bottom -->
  <line class="qline" x1="20" y1="10" x2="880" y2="10"/>
  <line class="qline" x1="20" y1="150" x2="880" y2="150" style="animation-delay:2s"/>

  <!-- corner brackets -->
  <path d="M20 40 L20 14 L60 14"  class="corner corner-pulse"/>
  <path d="M880 40 L880 14 L840 14" class="corner corner-pulse" style="animation-delay:1s"/>
  <path d="M20 120 L20 146 L60 146" class="corner corner-pulse" style="animation-delay:0.5s"/>
  <path d="M880 120 L880 146 L840 146" class="corner corner-pulse" style="animation-delay:1.5s"/>

  <!-- quote marks -->
  <text class="qmark" x="80"  y="95">"</text>
  <text class="qmark" x="800" y="95">"</text>

  <!-- quote text -->
  <text class="qtxt" x="450" y="68" text-anchor="middle">
    Code is the brush — Pixels are the canvas.
  </text>
  <text class="qtxt" x="450" y="96" text-anchor="middle" font-size="16" fill="#ffffff90">
    Every frame is a battlefield. Every render, a victory.
  </text>

  <!-- author -->
  <text class="qsub" x="450" y="130" text-anchor="middle">
    — THE PIXEL TAMER  ·  CYBER KING ◈
  </text>

  <!-- particle accents -->
  <circle class="pdot pa1" cx="140" cy="60" r="2"/>
  <circle class="pdot pa2" cx="760" cy="60" r="2"/>
  <circle class="pdot pa3" cx="450" cy="14" r="2"/>
</svg>
