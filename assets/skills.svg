<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg2 { fill: #000; }
      .scan { fill:none; stroke:#00b4d820; stroke-width:0.4; }
      .lbl  { font-family:'Courier New',monospace; font-size:11px; fill:#00b4d8; letter-spacing:2px; }
      .val  { font-family:'Courier New',monospace; font-size:13px; fill:#fff; font-weight:bold; }
      .sub2 { font-family:'Courier New',monospace; font-size:9px;  fill:#00b4d870; letter-spacing:1px; }
      .hdr  { font-family:'Courier New',monospace; font-size:10px; fill:#00b4d8; letter-spacing:5px; }

      /* ring outer slow spin */
      .ring-outer {
        fill:none; stroke:#00b4d815; stroke-width:1;
        animation: spinSlow 30s linear infinite;
        transform-origin: center;
      }
      /* ring mid */
      .ring-mid {
        fill:none; stroke:#00b4d825; stroke-width:0.5; stroke-dasharray:4 8;
        animation: spinSlow 20s linear infinite reverse;
        transform-origin: center;
      }

      @keyframes spinSlow { to { transform:rotate(360deg); } }

      /* progress bar fill */
      .bar-fill {
        height:6px; rx:3; fill:#00b4d8;
        animation: barGrow 2s ease forwards;
      }
      @keyframes barGrow { from{width:0} }

      .bar-bg { fill:#00b4d810; rx:3; }

      /* card hover glow line top */
      .card-top {
        stroke:#00b4d8; stroke-width:1.5; stroke-linecap:square;
        animation: toplineGlow 4s ease-in-out infinite;
      }
      @keyframes toplineGlow {
        0%,100%{ stroke-opacity:0.4; }
        50%    { stroke-opacity:1; }
      }

      /* number count-up handled by animateTransform */
      .pct { fill:#00b4d8; font-family:'Courier New',monospace; font-size:10px; }

      /* section divider dash animation */
      .divline {
        stroke:#00b4d8; stroke-width:0.5; stroke-dasharray:6 10;
        animation: dashMove 4s linear infinite;
      }
      @keyframes dashMove { to { stroke-dashoffset:-100; } }
    </style>
    <pattern id="sp2" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <line class="scan" x1="0" y1="0" x2="900" y2="0"/>
    </pattern>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" class="bg2"/>
  <rect width="900" height="420" fill="url(#sp2)"/>

  <!-- Section header -->
  <line class="divline" x1="20" y1="30" x2="320" y2="30"/>
  <text class="hdr" x="450" y="34" text-anchor="middle">◈  3D ARCHITECTURE  &amp;  VFX ARMORY  ◈</text>
  <line class="divline" x1="580" y1="30" x2="880" y2="30"/>

  <!-- ═══════ ROW 1 ═══════ -->

  <!-- BLENDER card x=30 -->
  <g transform="translate(30,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0"/>
    <!-- ring decorations -->
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:25s"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22"/>
    <!-- icon placeholder diamond -->
    <polygon points="65,26 73,34 65,42 57,34" fill="none" stroke="#00b4d8" stroke-width="1.2">
      <animateTransform attributeName="transform" type="rotate" from="0 65 34" to="360 65 34" dur="8s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="65" cy="34" r="3" fill="#00b4d8">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text class="lbl" x="65" y="82" text-anchor="middle">BLENDER</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Pipeline Auto.</text>
    <!-- bar -->
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="110" height="5" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="110" dur="2s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">99%</text>
  </g>

  <!-- HOUDINI card x=175 -->
  <g transform="translate(175,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:0.5s"/>
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:22s;animation-direction:reverse"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22" style="animation-direction:normal"/>
    <polygon points="65,22 69,30 77,30 71,36 73,44 65,39 57,44 59,36 53,30 61,30" fill="none" stroke="#00b4d8" stroke-width="1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <text class="lbl" x="65" y="82" text-anchor="middle">HOUDINI</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Proc. Destruction</text>
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="93" height="5" rx="2" fill="#00b4d8" style="animation-delay:0.3s">
      <animate attributeName="width" from="0" to="93" dur="2s" begin="0.3s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">84%</text>
  </g>

  <!-- UNREAL card x=320 -->
  <g transform="translate(320,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:1s"/>
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:35s"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22" style="animation-duration:15s"/>
    <rect x="53" y="26" width="24" height="16" fill="none" stroke="#00b4d8" stroke-width="1" rx="1">
      <animate attributeName="transform" type="rotate" calcMode="discrete" values="0 65 34;90 65 34;180 65 34;270 65 34" dur="4s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <text class="lbl" x="65" y="82" text-anchor="middle">UNREAL 5</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Virtual Production</text>
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="96" height="5" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="96" dur="2s" begin="0.6s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">87%</text>
  </g>

  <!-- MAYA card x=465 -->
  <g transform="translate(465,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:1.5s"/>
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:18s;animation-direction:reverse"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22"/>
    <line x1="55" y1="30" x2="75" y2="38" stroke="#00b4d8" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0 65 34" to="360 65 34" dur="6s" repeatCount="indefinite"/>
    </line>
    <circle cx="65" cy="34" r="4" fill="none" stroke="#00b4d8" stroke-width="1.5"/>
    <text class="lbl" x="65" y="82" text-anchor="middle">MAYA</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Technical Rigging</text>
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="94" height="5" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="94" dur="2s" begin="0.9s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">85%</text>
  </g>

  <!-- ZBRUSH card x=610 -->
  <g transform="translate(610,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:2s"/>
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:28s"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22" style="animation-duration:12s;animation-direction:reverse"/>
    <circle cx="65" cy="34" r="10" fill="none" stroke="#00b4d8" stroke-width="1">
      <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text class="lbl" x="65" y="82" text-anchor="middle">ZBRUSH</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Organic Sculpting</text>
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="97" height="5" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="97" dur="2s" begin="1.2s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">88%</text>
  </g>

  <!-- GAEA card x=755 -->
  <g transform="translate(755,55)">
    <rect width="130" height="110" fill="#00b4d808" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:2.5s"/>
    <circle class="ring-outer" cx="65" cy="42" r="28" style="animation-duration:40s"/>
    <circle class="ring-mid"   cx="65" cy="42" r="22"/>
    <!-- terrain wave -->
    <polyline points="45,40 50,28 55,35 60,26 65,32 70,24 75,30 80,38 85,34" fill="none" stroke="#00b4d8" stroke-width="1.2">
      <animate attributeName="points"
        values="45,40 50,28 55,35 60,26 65,32 70,24 75,30 80,38 85,34;
                45,38 50,32 55,28 60,30 65,26 70,28 75,34 80,30 85,38;
                45,40 50,28 55,35 60,26 65,32 70,24 75,30 80,38 85,34"
        dur="3s" repeatCount="indefinite"/>
    </polyline>
    <text class="lbl" x="65" y="82" text-anchor="middle">GAEA</text>
    <text class="sub2" x="65" y="94" text-anchor="middle">Terramorphing</text>
    <rect x="10" y="100" width="110" height="5" rx="2" class="bar-bg"/>
    <rect x="10" y="100" width="88" height="5" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="88" dur="2s" begin="1.5s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="99" text-anchor="end" font-size="8">80%</text>
  </g>

  <!-- ═══════ ROW 2 divider ═══════ -->
  <line class="divline" x1="20" y1="200" x2="880" y2="200"/>
  <text class="hdr" x="450" y="215" text-anchor="middle">◈  COMPOSITING  &amp;  TRACKING  ◈</text>

  <!-- ROW 2 — VFX tools simplified cards -->
  <!-- NUKE -->
  <g transform="translate(30,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:0.2s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">NUKE 16</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">Deep Compositing</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="101" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="101" dur="1.8s" begin="0.2s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">92%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">█████████░░ EXPERT</text>
  </g>

  <!-- SYNTHEYES -->
  <g transform="translate(175,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:0.4s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">SYNTHEYES</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">Precision Solving</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="90" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="90" dur="1.8s" begin="0.4s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">82%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">█████████░░░ ADV.</text>
  </g>

  <!-- 3DEQUALIZER -->
  <g transform="translate(320,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:0.6s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">3DEQUALIZER</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">Matchmoving</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="88" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="88" dur="1.8s" begin="0.6s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">80%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">█████████░░░ ADV.</text>
  </g>

  <!-- SUBSTANCE -->
  <g transform="translate(465,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:0.8s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">SUBSTANCE 3D</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">PBR Alchemy</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="95" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="95" dur="1.8s" begin="0.8s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">86%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">██████████░░ EXPERT</text>
  </g>

  <!-- MARMOSET -->
  <g transform="translate(610,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:1s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">MARMOSET</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">Lighting &amp; Look-Dev</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="91" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="91" dur="1.8s" begin="1s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">83%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">█████████░░░ ADV.</text>
  </g>

  <!-- CASCADEUR -->
  <g transform="translate(755,225)">
    <rect width="130" height="80" fill="#ffffff05" rx="2"/>
    <line class="card-top" x1="0" y1="0" x2="130" y2="0" style="animation-delay:1.2s"/>
    <text class="lbl" x="65" y="25" text-anchor="middle">CASCADEUR</text>
    <text class="sub2" x="65" y="38" text-anchor="middle">Physics Animation</text>
    <rect x="10" y="48" width="110" height="4" rx="2" fill="#00b4d810"/>
    <rect x="10" y="48" width="83" height="4" rx="2" fill="#00b4d8">
      <animate attributeName="width" from="0" to="83" dur="1.8s" begin="1.2s" fill="freeze"/>
    </rect>
    <text class="pct" x="120" y="47" text-anchor="end" font-size="8">75%</text>
    <text class="sub2" x="65" y="70" text-anchor="middle" fill="#00b4d840">████████░░░░ SOLID</text>
  </g>

  <!-- bottom border -->
  <line x1="20" y1="415" x2="880" y2="415" stroke="#00b4d820" stroke-width="0.5"/>
</svg>
